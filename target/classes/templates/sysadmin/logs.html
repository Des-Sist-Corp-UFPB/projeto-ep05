<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Logs &amp; Auditoria</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold">Logs &amp; Auditoria</h1>
            <p class="text-muted mb-0">Histórico de ações críticas do sistema</p>
        </div>
        <span class="badge bg-secondary px-3 py-2">Somente leitura</span>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="list-group list-group-flush">
                <div th:if="${logs == null or logs.empty}"
                     class="list-group-item text-center text-muted py-5">
                    Nenhum log registrado.
                </div>
                <div th:each="log, stat : ${logs}"
                     class="list-group-item py-3 px-4"
                     th:classappend="${stat.even} ? 'bg-light'">
                    <div class="d-flex align-items-start gap-3">
                        <!-- Ícone por tipo de log -->
                        <span th:if="${#strings.contains(log, 'SECURITY')}"
                              class="badge bg-danger mt-1">🔐</span>
                        <span th:if="${#strings.contains(log, 'SYSADMIN')}"
                              class="badge bg-warning text-dark mt-1">⚙️</span>
                        <span th:if="${#strings.contains(log, 'ADMIN')  and !#strings.contains(log, 'SYSADMIN')}"
                              class="badge bg-primary mt-1">👤</span>
                        <span th:if="${#strings.contains(log, 'SYSTEM')}"
                              class="badge bg-success mt-1">🖥️</span>
                        <code class="small flex-grow-1 text-break" th:text="${log}"></code>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
