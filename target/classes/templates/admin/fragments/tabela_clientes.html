<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tabela" id="tabela-clientes">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${clientes == null or clientes.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-4">Nenhum cliente encontrado.</td>
            </tr>
            <tr th:each="c : ${clientes}">
                <td th:text="${c.id}"></td>
                <td class="fw-semibold" th:text="${c.nome}"></td>
                <td class="text-muted" th:text="${c.email}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${c.status.name() == 'ATIVO'} ? 'bg-success' : 'bg-danger'"
                          th:text="${c.status.name() == 'ATIVO' ? 'Ativo' : 'Bloqueado'}">
                    </span>
                </td>
                <td class="text-end">
                    <button class="btn btn-sm"
                            th:classappend="${c.status.name() == 'ATIVO'} ? 'btn-outline-danger' : 'btn-outline-success'"
                            th:hx-post="@{/admin/clientes/{id}/bloquear(id=${c.id})}"
                            hx-target="#tabela-clientes"
                            hx-swap="outerHTML"
                            th:text="${c.status.name() == 'ATIVO'} ? 'Bloquear' : 'Desbloquear'">
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

    <nav th:if="${clientes != null and clientes.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/clientes(pagina=${paginaAtual - 1}, busca=${busca})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, clientes.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/admin/clientes(pagina=${i}, busca=${busca})}"></a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual >= clientes.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/clientes(pagina=${paginaAtual + 1}, busca=${busca})}">Próxima</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
