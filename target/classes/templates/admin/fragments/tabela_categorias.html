<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tabela" id="tabela-categorias">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${categorias == null or categorias.isEmpty()}">
                <td colspan="4" class="text-center text-muted py-4">Nenhuma categoria cadastrada.</td>
            </tr>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.id}"></td>
                <td class="fw-semibold" th:text="${cat.nome}"></td>
                <td class="text-muted" th:text="${cat.descricao != null ? cat.descricao : '—'}"></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-secondary me-1"
                            th:hx-get="@{/admin/categorias/{id}/editar(id=${cat.id})}"
                            hx-target="#modal-container"
                            hx-swap="innerHTML">
                        Editar
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                            th:hx-delete="@{/admin/categorias/{id}(id=${cat.id})}"
                            hx-confirm="Excluir esta categoria?"
                            th:hx-target="'#linha-cat-' + ${cat.id}"
                            hx-swap="outerHTML">
                        Excluir
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Paginação -->
    <nav th:if="${categorias != null and categorias.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/categorias(pagina=${paginaAtual - 1})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, categorias.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/admin/categorias(pagina=${i})}"></a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual >= categorias.totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/categorias(pagina=${paginaAtual + 1})}">Próxima</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
