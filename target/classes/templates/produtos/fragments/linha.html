<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="linha">
    <div class="col" th:id="'produto-' + ${produto.id}">
        <div class="card h-100">

            <!-- Imagem -->
            <div style="height: 180px; overflow: hidden; border-radius: 13px 13px 0 0; background: var(--cor-fundo);">
                <img th:if="${produto.imagens != null and !produto.imagens.empty}"
                     th:src="${produto.imagens[0].url}"
                     class="w-100 h-100"
                     style="object-fit: cover;"
                     th:alt="${produto.nome}"/>
                <div th:unless="${produto.imagens != null and !produto.imagens.empty}"
                     class="w-100 h-100 d-flex align-items-center justify-content-center text-muted">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                         fill="currentColor" class="bi bi-image" viewBox="0 0 16 16">
                        <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                        <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1z"/>
                    </svg>
                </div>
            </div>

            <div class="card-body d-flex flex-column">

                <!-- Nome e status -->
                <div class="d-flex justify-content-between align-items-start mb-1">
                    <h6 class="card-title fw-bold mb-0" th:text="${produto.nome}">Nome</h6>
                    <span th:if="${produto.ativo}"
                          class="badge bg-success ms-2 flex-shrink-0">Ativo</span>
                    <span th:unless="${produto.ativo}"
                          class="badge bg-secondary ms-2 flex-shrink-0">Inativo</span>
                </div>

                <!-- Categoria -->
                <span th:if="${produto.categoria != null}"
                      class="badge mb-2"
                      style="background-color: var(--cor-detalhe-2); color: var(--cor-texto-3); width: fit-content;"
                      th:text="${produto.categoria.nome}">Categoria</span>

                <!-- Descrição truncada -->
                <p class="card-text text-muted small flex-grow-1"
                   style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"
                   th:text="${produto.descricao}">Descrição</p>

                <!-- Estoque e preço -->
                <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
                    <span class="badge"
                          style="background-color: #0c9abf; color: #fff;"
                          th:text="${produto.estoque} + ' em estoque'">0 em estoque</span>
                    <span class="fw-bold"
                          style="color: var(--cor-botao-secundario); font-size: 1.05rem;"
                          th:text="${'R$ ' + #numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </span>
                </div>

                <!-- Ações -->
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary btn-sm flex-grow-1"
                            th:attr="hx-get='/produtos/' + ${produto.id} + '/editar'"
                            hx-target="#modal-container"
                            hx-swap="innerHTML">
                        ✏️ Editar
                    </button>
                    <button class="btn btn-outline-danger btn-sm"
                            th:attr="hx-delete='/produtos/' + ${produto.id},
                            hx-confirm='Confirma a exclusão de &quot;' + ${produto.nome} + '&quot;?',
                            hx-target='#produto-' + ${produto.id}"
                            hx-swap="outerHTML swap:0.3s">
                        🗑️
                    </button>
                </div>

            </div>
        </div>
    </div>
</th:block>

</body>
</html>
