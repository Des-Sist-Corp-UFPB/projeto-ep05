<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="tabela">

    <div th:if="${produtos == null or produtos.content.empty}"
         class="text-center text-muted py-5">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
             fill="currentColor" class="bi bi-inbox d-block mx-auto mb-2"
             viewBox="0 0 16 16">
            <path d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4zm-1.17-.437A1.5 1.5 0 0 1 4.98 3h6.04a1.5 1.5 0 0 1 1.17.563l3.7 4.625a.5.5 0 0 1 .106.374l-.39 3.124A1.5 1.5 0 0 1 14.117 13H1.883a1.5 1.5 0 0 1-1.489-1.314l-.39-3.124a.5.5 0 0 1 .106-.374z"/>
        </svg>
        Nenhum produto encontrado.
    </div>

    <div id="cards-produtos"
         class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4"
         th:unless="${produtos == null or produtos.content.empty}">

        <th:block th:each="produto : ${produtos.content}"
                  th:insert="~{produtos/fragments/linha :: linha}">
        </th:block>

    </div>

    <!-- Paginação -->
    <nav th:if="${produtos != null and produtos.totalPages > 1}"
         aria-label="Paginação de produtos" class="mt-4">
        <ul class="pagination pagination-sm justify-content-center mb-0">

            <li class="page-item" th:classappend="${produtos.first} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/produtos/fragmento-tabela(pagina=${paginaAtual - 1}, busca=${busca})}"
                   hx-target="#tabela-container"
                   hx-swap="innerHTML">«</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, produtos.totalPages - 1)}"
                class="page-item"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link"
                   th:hx-get="@{/produtos/fragmento-tabela(pagina=${i}, busca=${busca})}"
                   hx-target="#tabela-container"
                   hx-swap="innerHTML"
                   th:text="${i + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${produtos.last} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/produtos/fragmento-tabela(pagina=${paginaAtual + 1}, busca=${busca})}"
                   hx-target="#tabela-container"
                   hx-swap="innerHTML">»</a>
            </li>

        </ul>
        <p class="text-center text-muted small mt-1">
            Página <span th:text="${paginaAtual + 1}">1</span>
            de <span th:text="${produtos.totalPages}">1</span>
            — <span th:text="${produtos.totalElements}">0</span> produto(s) no total
        </p>
    </nav>

</th:block>

</body>
</html>
