spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mercado_dev
    username: mercado
    password: mercado123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: o Hibernate ajusta o schema automaticamente em dev.
      # Nunca use create-drop em dev com dados importantes — apaga tudo!
      # Em prod e test usamos validate (o Flyway é o dono do schema).
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: permite rodar o Flyway em banco que já tem tabelas
    # (criadas pelo ddl-auto antes do Flyway existir no projeto)
    baseline-on-migrate: true

logging:
  level:
    br.ufpb.dsc.mercado: DEBUG
    org.springframework.web: DEBUG
