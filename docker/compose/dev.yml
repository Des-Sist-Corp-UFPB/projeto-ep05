# =============================================================================
# Docker Compose — DESENVOLVIMENTO
# =============================================================================
# Sobe o ambiente completo com:
#   - postgres:   PostgreSQL 16
#   - app:        Spring Boot com hot-reload
#   - frontend:   React buildado servido pelo Nginx interno
#   - nginx:      Proxy reverso (porta 80) usando nomes de container *-dev
#   - adminer:    Gerenciador de banco (http://localhost:8888)
#
# Como usar (a partir da raiz do projeto):
#   docker compose -f docker/docker-compose.dev.yml --env-file backend/.env.dev --env-file frontend-cliente/.env up --build
#
# Acessos:
#   http://localhost        → aplicação completa via Nginx
#   http://localhost:8080   → backend diretamente
#   http://localhost:5173   → frontend diretamente
#   http://localhost:8888   → Adminer
#
# ⚠️  Para apagar dados do banco: docker compose ... down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mercado-postgres-dev
    environment:
      POSTGRES_DB: mercado_dev
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d mercado_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Backend Spring Boot (hot-reload via Spring DevTools)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ../../backend
      dockerfile: docker/Dockerfile.dev
    container_name: mercado-app-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
    ports:
      - "8080:8080"
    volumes:
      - ../backend/src:/app/src
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Frontend React
  # Porta 5173 exposta para acesso direto (sem passar pelo nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../frontend-cliente
      dockerfile: docker/Dockerfile
      args:
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY}
    container_name: mercado-frontend-dev
    expose:
      - "80"
    ports:
      - "5173:80"
    depends_on:
      - app
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Nginx (dev) — usa nginx.dev.conf que aponta para os containers *-dev
  # Acesse: http://localhost
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ../../nginx
      dockerfile: Dockerfile.dev
    container_name: mercado-nginx-dev
    ports:
      - "80:80"
    depends_on:
      - app
      - frontend
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Adminer: gerenciador do banco (http://localhost:8888)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: mercado-adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgres
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Trivy: scanner de vulnerabilidades (perfil opcional)
  # Uso: docker compose ... --profile scan up trivy
  # ---------------------------------------------------------------------------
  trivy:
    image: aquasec/trivy:latest
    container_name: mercado-trivy
    profiles:
      - scan
    volumes:
      - ..:/project:ro
      - trivy-cache:/root/.cache/trivy
    command: fs /project --severity HIGH,CRITICAL --exit-code 1
    networks:
      - mercado-net

volumes:
  postgres-dev-data:
  maven-cache:
  trivy-cache:

networks:
  mercado-net:
    driver: bridge
