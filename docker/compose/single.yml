# =============================================================================
# Docker Compose — imagem ÚNICA (frontend + backend + nginx no mesmo container)
# =============================================================================
# Serviços: PostgreSQL · app (frontend-cliente + backend + nginx, tudo junto)
#
# ARQUITETURA:
#   app (porta 80, única porta exposta) contém:
#     - Nginx: serve o React (SPA) e roteia /api, /admin, /sysadmin, /produtos,
#       /logout, /actuator, /webjars, /images, /css, /js → Spring Boot local
#     - Spring Boot: roda internamente em 127.0.0.1:8080 (não exposto ao host)
#
# Como usar (a partir da pasta raiz do projeto):
#   docker compose -f docker/compose/single.yml --env-file .env up -d --build
#
# VARIÁVEIS DE AMBIENTE — arquivo .env na raiz do projeto (ou no servidor):
#   APP_IMAGE=ghcr.io/usuario/repo-app:latest
#   DATABASE_URL=jdbc:postgresql://postgres:5432/mercado_prod
#   DATABASE_USERNAME=mercado
#   DATABASE_PASSWORD=<senha-forte>
#   APP_JWT_SECRET=<segredo-jwt>
#   APP_SEED_ADMIN_PASSWORD=<senha-admin>
#   MERCADOPAGO_ACCESS_TOKEN=<chave-live-APP_USR-...>
#   VITE_MP_PUBLIC_KEY=<chave-publica-mercado-pago>
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: mercado-postgres
    environment:
      POSTGRES_DB: mercado_prod
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d mercado_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - mercado-net

  app:
    build:
      context: ../..
      dockerfile: docker/single/Dockerfile
      args:
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY}
    image: ${APP_IMAGE}
    container_name: mercado-app
    environment:
      SPRING_DATASOURCE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/mercado_prod}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
    ports:
      - "80:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - mercado-net

volumes:
  postgres-data:

networks:
  mercado-net:
    driver: bridge
