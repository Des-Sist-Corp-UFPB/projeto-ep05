server {
    listen 80;
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Backend (Spring Boot roda no mesmo container, em 127.0.0.1:8080) ──────
    location ^~ /api/      { proxy_pass http://127.0.0.1:8080; }
    location ^~ /ping      { proxy_pass http://127.0.0.1:8080; }
    location ^~ /actuator/ { proxy_pass http://127.0.0.1:8080; }
    location ^~ /webjars/  { proxy_pass http://127.0.0.1:8080; }
    location ^~ /images/   { proxy_pass http://127.0.0.1:8080; }
    location ^~ /admin     { proxy_pass http://127.0.0.1:8080; }
    location ^~ /sysadmin  { proxy_pass http://127.0.0.1:8080; }
    location ^~ /produtos  { proxy_pass http://127.0.0.1:8080; }
    location ^~ /logout    { proxy_pass http://127.0.0.1:8080; }
    location ^~ /css/      { proxy_pass http://127.0.0.1:8080; }
    location ^~ /js/       { proxy_pass http://127.0.0.1:8080; }

    # ── Assets do Vite → React (arquivos hasheados, cache longo) ──────────────
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA (fallback para index.html nas rotas do React Router) ────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
