<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cadastro — Sweet Delights</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo:             #F9DDE5;
            --cor-secundaria:        #833320;
            --cor-detalhe:           #FFF8EB;
            --cor-detalhe-2:         #EE90AF;
            --cor-texto-2:           #FFFFFF;
            --cor-texto-3:           #803225;
            --cor-backgroundDetails: #E15477;
            --cor-botao:             #D96A88;
        }

        body {
            background: linear-gradient(145deg, var(--cor-fundo) 0%, var(--cor-detalhe-2) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            padding: 2rem 1rem;
        }

        .cadastro-wrapper {
            width: 100%;
            max-width: 560px;
        }

        .cadastro-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(131, 51, 32, 0.22);
        }

        .cadastro-header {
            background: linear-gradient(135deg, var(--cor-secundaria) 0%, var(--cor-backgroundDetails) 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            color: var(--cor-texto-2);
        }

        .cadastro-header .icon-ring {
            width: 75px;
            height: 75px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        .cadastro-header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.2rem; }
        .cadastro-header p  { font-size: 0.8rem; opacity: 0.82; margin: 0; }

        .cadastro-body {
            background-color: var(--cor-detalhe);
            padding: 2rem 2rem 1.5rem;
        }

        .secao-titulo {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--cor-texto-3);
            border-bottom: 2px solid var(--cor-detalhe-2);
            padding-bottom: 0.4rem;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .form-label { font-weight: 600; color: var(--cor-texto-3); font-size: 0.9rem; }

        .form-control {
            border-color: var(--cor-detalhe-2);
            border-radius: 9px;
            padding: 0.6rem 0.85rem;
            background-color: #fff;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--cor-botao);
            box-shadow: 0 0 0 3px rgba(217, 106, 136, 0.2);
        }

        .form-control.is-invalid { border-color: #dc3545; }

        .input-group-text {
            background-color: var(--cor-detalhe-2);
            border-color: var(--cor-detalhe-2);
            color: var(--cor-texto-3);
            border-radius: 9px 0 0 9px;
        }

        .input-group .form-control { border-radius: 0 9px 9px 0; }

        .btn-cadastrar {
            background: linear-gradient(135deg, var(--cor-botao) 0%, var(--cor-backgroundDetails) 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 10px;
            padding: 0.7rem;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-cadastrar:hover { opacity: 0.93; transform: translateY(-1px); color: #fff; }

        .link-login { color: var(--cor-texto-3); font-weight: 600; }
        .link-login:hover { color: var(--cor-backgroundDetails); }

        .cadastro-footer {
            background-color: var(--cor-detalhe);
            border-top: 1px solid var(--cor-detalhe-2);
            padding: 0.85rem;
            text-align: center;
            font-size: 0.78rem;
            color: var(--cor-texto-3);
        }

        .divider {
            height: 3px;
            background: linear-gradient(90deg, var(--cor-detalhe-2), var(--cor-botao), var(--cor-detalhe-2));
        }

        .senha-requisitos {
            font-size: 0.78rem;
            color: #888;
            margin-top: 0.35rem;
        }

        .alert-danger {
            background-color: rgba(131,51,32,0.1);
            border-color: var(--cor-secundaria);
            color: var(--cor-secundaria);
            border-radius: 9px;
            font-size: 0.9rem;
        }

        .alert-success {
            background-color: rgba(2,134,67,0.1);
            border-color: #028643;
            color: #028643;
            border-radius: 9px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="cadastro-wrapper">
    <div class="cadastro-card">

        <!-- Header -->
        <div class="cadastro-header">
            <div class="icon-ring">
                <img th:src="@{/assets/logo.png}" width="58" height="58" style="object-fit: contain;"/>
            </div>
            <h1>🍰 Criar sua conta</h1>
            <p>Sweet Delights &mdash; UFPB Campus IV</p>
        </div>

        <div class="divider"></div>

        <!-- Body -->
        <div class="cadastro-body">

            <!-- Alerta de erro -->
            <div th:if="${erro}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                     class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                    <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                </svg>
                <div th:text="${erro}">Erro</div>
            </div>

            <!-- Alerta de sucesso -->
            <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center mb-3" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                     class="bi bi-check-circle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                </svg>
                <div th:text="${sucesso}">Sucesso</div>
            </div>

            <p class="text-center mb-0" style="color: var(--cor-texto-3); font-weight: 500; font-size: 0.95rem;">
                Preencha os dados abaixo para criar sua conta
            </p>

            <form th:action="@{/admin/cadastro}" method="post">

                <!-- SEÇÃO: DADOS PESSOAIS -->
                <div class="secao-titulo">👤 Dados Pessoais</div>

                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0">
                        <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
                        <input type="text" id="nome" name="nome"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('nome')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.nome}"
                               placeholder="Seu primeiro nome"
                               maxlength="100" required autofocus/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('nome')}"
                             th:text="${errosCampos['nome']}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label for="sobrenome" class="form-label">Sobrenome <span class="text-danger">*</span></label>
                        <input type="text" id="sobrenome" name="sobrenome"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('sobrenome')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.sobrenome}"
                               placeholder="Seu sobrenome"
                               maxlength="100" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('sobrenome')}"
                             th:text="${errosCampos['sobrenome']}"></div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0">
                        <label for="cpf" class="form-label">CPF <span class="text-danger">*</span></label>
                        <input type="text" id="cpf" name="cpf"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('cpf')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.cpf}"
                               placeholder="000.000.000-00"
                               maxlength="14" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('cpf')}"
                             th:text="${errosCampos['cpf']}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label for="dataNascimento" class="form-label">Data de Nascimento <span class="text-danger">*</span></label>
                        <input type="date" id="dataNascimento" name="dataNascimento"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('dataNascimento')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.dataNascimento}"
                               required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('dataNascimento')}"
                             th:text="${errosCampos['dataNascimento']}"></div>
                    </div>
                </div>

                <!-- SEÇÃO: CONTATO -->
                <div class="secao-titulo">📬 Contato</div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor"
                                 class="bi bi-envelope" viewBox="0 0 16 16">
                                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                            </svg>
                        </span>
                        <input type="email" id="email" name="email"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('email')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.email}"
                               placeholder="seu@email.com"
                               autocomplete="email" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('email')}"
                             th:text="${errosCampos['email']}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label">Telefone <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor"
                                 class="bi bi-telephone" viewBox="0 0 16 16">
                                <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58zM1.884.511a1.745 1.745 0 0 1 2.612.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>
                            </svg>
                        </span>
                        <input type="tel" id="telefone" name="telefone"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('telefone')} ? 'is-invalid'"
                               th:value="${dadosAnteriores?.telefone}"
                               placeholder="(00) 00000-0000"
                               maxlength="15" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('telefone')}"
                             th:text="${errosCampos['telefone']}"></div>
                    </div>
                </div>

                <!-- SEÇÃO: SENHA -->
                <div class="secao-titulo">🔒 Segurança</div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor"
                                 class="bi bi-lock" viewBox="0 0 16 16">
                                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2M5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1"/>
                            </svg>
                        </span>
                        <input type="password" id="senha" name="senha"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('senha')} ? 'is-invalid'"
                               placeholder="Mínimo 8 caracteres"
                               autocomplete="new-password" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('senha')}"
                             th:text="${errosCampos['senha']}"></div>
                    </div>
                    <div class="senha-requisitos">
                        Mínimo 8 caracteres, uma letra maiúscula, uma minúscula e um número.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmacaoSenha" class="form-label">Confirmar Senha <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor"
                                 class="bi bi-shield-check" viewBox="0 0 16 16">
                                <path d="M5.338 1.59a61 61 0 0 0-2.837.856.48.48 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.7 10.7 0 0 0 2.287 2.233c.346.244.652.42.893.533q.18.085.293.118a1 1 0 0 0 .101.025 1 1 0 0 0 .1-.025q.114-.034.294-.118c.24-.113.547-.29.893-.533a10.7 10.7 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524zM5.072.56C6.157.265 7.31 0 8 0s1.843.265 2.928.56c1.11.3 2.229.655 2.887.87a1.54 1.54 0 0 1 1.044 1.262c.596 4.477-.787 7.795-2.465 9.99a11.8 11.8 0 0 1-2.517 2.453 7 7 0 0 1-1.048.625c-.28.132-.581.24-.829.24s-.548-.108-.829-.24a7 7 0 0 1-1.048-.625 11.8 11.8 0 0 1-2.517-2.453C1.928 10.487.545 7.169 1.141 2.692A1.54 1.54 0 0 1 2.185 1.43 63 63 0 0 1 5.072.56"/>
                                <path d="M10.854 5.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 7.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
                            </svg>
                        </span>
                        <input type="password" id="confirmacaoSenha" name="confirmacaoSenha"
                               class="form-control"
                               th:classappend="${errosCampos?.containsKey('confirmacaoSenha')} ? 'is-invalid'"
                               placeholder="Repita a senha"
                               autocomplete="new-password" required/>
                        <div class="invalid-feedback"
                             th:if="${errosCampos?.containsKey('confirmacaoSenha')}"
                             th:text="${errosCampos['confirmacaoSenha']}"></div>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-cadastrar btn-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                             class="bi bi-person-plus-fill me-2" viewBox="0 0 16 16">
                            <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                            <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
                        </svg>
                        Criar minha conta
                    </button>
                </div>

                <p class="text-center mb-0" style="font-size: 0.9rem; color: var(--cor-texto-3);">
                    Já tem uma conta?
                    <a th:href="@{/admin/login}" class="link-login">Fazer login</a>
                </p>

            </form>
        </div>

        <div class="cadastro-footer">
            🍬 Sweet Delights &copy; 2026 &nbsp;|&nbsp; UFPB Campus IV
        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script>
    // Máscara simples de CPF
    document.getElementById('cpf').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, '').substring(0, 11);
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = v;
    });

    // Máscara simples de telefone
    document.getElementById('telefone').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, '').substring(0, 11);
        if (v.length <= 10) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{4})(\d)/, '$1-$2');
        } else {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{5})(\d)/, '$1-$2');
        }
        e.target.value = v;
    });

    // Validação visual de confirmação de senha
    const senha = document.getElementById('senha');
    const confirmacao = document.getElementById('confirmacaoSenha');

    function validarSenhas() {
        if (confirmacao.value && senha.value !== confirmacao.value) {
            confirmacao.setCustomValidity('As senhas não conferem');
            confirmacao.classList.add('is-invalid');
        } else {
            confirmacao.setCustomValidity('');
            confirmacao.classList.remove('is-invalid');
        }
    }

    senha.addEventListener('input', validarSenhas);
    confirmacao.addEventListener('input', validarSenhas);
</script>
</body>
</html>
