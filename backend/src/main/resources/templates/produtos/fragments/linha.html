<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<tr th:fragment="linha" th:id="'produto-' + ${produto.id}" th:classappend="${!produto.ativo} ? 'table-warning'">

    <!-- ID -->
    <td class="text-muted small" th:text="${produto.id}">#1</td>

    <!-- Nome -->
    <td>
        <span class="fw-semibold" th:text="${produto.nome}">Nome</span>
    </td>

    <!-- Categoria -->
    <td>
        <span th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem Categoria'}" class="badge bg-secondary">Categoria</span>
    </td>

    <!-- Estoque -->
    <td>
        <span th:text="${produto.estoque}" class="badge" th:classappend="${produto.estoque > 0} ? 'bg-info' : 'bg-danger'">0</span>
    </td>

    <!-- Preço -->
    <td class="text-end">
        <span class="badge bg-success fs-6">
            R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span>
        </span>
    </td>

    <!-- Status Ativo -->
    <td>
        <span th:text="${produto.ativo ? 'Ativo' : 'Inativo'}" class="badge" th:classappend="${produto.ativo} ? 'bg-success' : 'bg-warning'">Ativo</span>
    </td>

    <!-- Ações -->
    <td class="text-center">
        <div class="btn-group btn-group-sm">
            <button type="button"
                    class="btn btn-outline-primary"
                    th:attr="hx-get='/produtos/' + ${produto.id} + '/editar'"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    title="Editar produto">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                </svg>
            </button>

            <button type="button"
                    class="btn btn-outline-danger"
                    th:attr="hx-delete='/produtos/' + ${produto.id},
                             hx-target='#produto-' + ${produto.id},
                             hx-confirm='Confirma a exclusão do produto &quot;' + ${produto.nome} + '&quot;?'"
                    hx-swap="outerHTML"
                    title="Excluir produto">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                </svg>
            </button>
        </div>
    </td>

</tr>

</body>
</html>
