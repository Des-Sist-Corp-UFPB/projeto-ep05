<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragmento: tabela de administradores.
  É retornado diretamente pelo controller quando a requisição é HTMX (busca).
  id="tabela-admins" permite que o HTMX substitua este elemento inteiro.
-->
<div id="tabela-admins" th:fragment="tabela">

    <div th:if="${admins == null or admins.empty}" class="text-center py-5 text-muted">
        <div class="display-6 mb-2">👥</div>
        <p class="mb-0">Nenhum administrador encontrado.</p>
    </div>

    <div th:if="${admins != null and !admins.empty}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Cadastrado em</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="admin : ${admins.content}">
                        <td class="text-muted small" th:text="${admin.id}"></td>
                        <td class="fw-semibold" th:text="${admin.nome}"></td>
                        <td>
                            <span class="text-muted small" th:text="${admin.email}"></span>
                        </td>
                        <td>
                            <span th:if="${admin.status.name() == 'ATIVO'}"
                                  class="badge bg-success-subtle text-success border border-success-subtle">
                                ● Ativo
                            </span>
                            <span th:unless="${admin.status.name() == 'ATIVO'}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle">
                                ● Bloqueado
                            </span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(admin.criadoEm, 'dd/MM/yyyy')}"></td>
                        <td class="text-center">
                            <div class="d-flex gap-2 justify-content-center">
                                <!-- Botão editar (abre modal via HTMX) -->
                                <button class="btn btn-sm btn-outline-primary"
                                        th:hx-get="@{/sysadmin/admins/{id}/editar(id=${admin.id})}"
                                        hx-target="#modal-container"
                                        hx-swap="innerHTML">
                                    ✏️ Editar
                                </button>
                                <!-- Bloquear/Desbloquear via HTMX POST -->
                                <button th:if="${admin.status.name() == 'ATIVO'}"
                                        class="btn btn-sm btn-outline-danger"
                                        th:hx-post="@{/sysadmin/admins/{id}/bloquear(id=${admin.id})}"
                                        hx-target="#tabela-admins"
                                        hx-swap="outerHTML"
                                        hx-confirm="Bloquear este administrador?">
                                    🔒 Bloquear
                                </button>
                                <button th:unless="${admin.status.name() == 'ATIVO'}"
                                        class="btn btn-sm btn-outline-success"
                                        th:hx-post="@{/sysadmin/admins/{id}/bloquear(id=${admin.id})}"
                                        hx-target="#tabela-admins"
                                        hx-swap="outerHTML"
                                        hx-confirm="Desbloquear este administrador?">
                                    🔓 Desbloquear
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Paginação -->
        <nav th:if="${admins.totalPages > 1}" class="mt-3">
            <ul class="pagination pagination-sm justify-content-center mb-0">
                <li class="page-item" th:classappend="${admins.first} ? 'disabled'">
                    <a class="page-link"
                       th:hx-get="@{/sysadmin/admins(pagina=${admins.number - 1}, busca=${busca})}"
                       hx-target="#tabela-admins"
                       hx-swap="outerHTML">«</a>
                </li>
                <li class="page-item active">
                    <span class="page-link"
                          th:text="${admins.number + 1} + ' / ' + ${admins.totalPages}"></span>
                </li>
                <li class="page-item" th:classappend="${admins.last} ? 'disabled'">
                    <a class="page-link"
                       th:hx-get="@{/sysadmin/admins(pagina=${admins.number + 1}, busca=${busca})}"
                       hx-target="#tabela-admins"
                       hx-swap="outerHTML">»</a>
                </li>
            </ul>
        </nav>
    </div>

</div>

</body>
</html>
