# =============================================================================
# Docker Compose — PRODUÇÃO
# Serviços: PostgreSQL · Backend Spring Boot · Frontend React (Nginx)
# =============================================================================
#
# VARIÁVEIS DE AMBIENTE — arquivo .env na raiz do projeto no servidor:
#
#   APP_IMAGE=ghcr.io/usuario/mercado:latest
#   FRONTEND_IMAGE=ghcr.io/usuario/mercado-frontend:latest
#   DATABASE_URL=jdbc:postgresql://postgres:5432/mercado_prod
#   DATABASE_USERNAME=mercado
#   DATABASE_PASSWORD=<senha-forte>
#   APP_JWT_SECRET=<segredo-jwt>
#   APP_SEED_ADMIN_PASSWORD=<senha-admin>
#
# PORTAS EXPOSTAS:
#   - 80   → Frontend React (Nginx) — acesso público
#   - 8080 → Backend Spring Boot    — acesso interno (ou público se não usar Nginx proxy)
#
# PRIMEIRA EXECUÇÃO:
#   docker compose -f backend/docker/docker-compose.prod.yml up -d postgres
#   # Aguardar ~10s e depois:
#   docker compose -f backend/docker/docker-compose.prod.yml up -d
#
# ATUALIZAÇÕES (feitas automaticamente pelo GitHub Actions):
#   docker compose -f backend/docker/docker-compose.prod.yml up -d --no-deps --force-recreate app frontend
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mercado-postgres-prod
    environment:
      POSTGRES_DB: mercado_prod
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d mercado_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Backend Spring Boot
  # ---------------------------------------------------------------------------
  app:
    image: ${APP_IMAGE}
    container_name: mercado-app-prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/mercado_prod}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Frontend React — Nginx servindo os estáticos + proxy para a API
  # ---------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: mercado-frontend-prod
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - mercado-net

volumes:
  postgres-prod-data:

networks:
  mercado-net:
    driver: bridge
