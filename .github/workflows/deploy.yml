name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Job 1 — Build e push da imagem ÚNICA (React + Spring Boot + Nginx)
  # ===========================================================================
  build:
    name: Build e push (imagem única)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
          echo "IMAGE_APP=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem única (frontend + backend + nginx)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/single/Dockerfile
          push: true
          tags: ${{ env.IMAGE_APP }}
          build-args: |
            VITE_MP_PUBLIC_KEY=${{ secrets.VITE_MP_PUBLIC_KEY }}

  # ===========================================================================
  # Job 2 — Deploy no servidor (roda após o build)
  # ===========================================================================
  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" \
            "cd '${{ secrets.DEPLOY_PATH }}' && \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
             docker compose -f docker/compose/prod.yml --env-file .env down --remove-orphans || true && \
             docker compose -f docker/compose/single.yml --env-file .env pull && \
             docker compose -f docker/compose/single.yml --env-file .env up -d && \
             docker image prune -f"
