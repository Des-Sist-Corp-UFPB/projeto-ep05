name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Job 1 — Build e push do Backend (Spring Boot)
  # ===========================================================================
  build-backend:
    name: Backend — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do backend (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
          echo "IMAGE_BACKEND=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}

  # ===========================================================================
  # Job 2 — Build e push do Frontend (React + Nginx interno)
  # ===========================================================================
  build-frontend:
    name: Frontend — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do frontend (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-frontend:latest"
          echo "IMAGE_FRONTEND=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-cliente
          file: ./frontend-cliente/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}

  # ===========================================================================
  # Job 3 — Build e push do Nginx central (proxy reverso)
  # ===========================================================================
  build-nginx:
    name: Nginx — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do nginx (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-nginx:latest"
          echo "IMAGE_NGINX=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NGINX }}

  # ===========================================================================
  # Job 4 — Deploy no servidor (roda após todos os builds)
  # ===========================================================================
  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-nginx]

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
