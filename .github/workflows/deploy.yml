name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Job 1 — Build e push do Backend (Spring Boot)
  # ===========================================================================
  build-backend:
    name: Backend — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do backend (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
          echo "IMAGE_BACKEND=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}

  # ===========================================================================
  # Job 2 — Build e push do Frontend (React + Nginx interno)
  # ===========================================================================
  build-frontend:
    name: Frontend — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do frontend (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-frontend:latest"
          echo "IMAGE_FRONTEND=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-cliente
          file: ./frontend-cliente/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}
          build-args: |
            VITE_MP_PUBLIC_KEY=${{ secrets.VITE_MP_PUBLIC_KEY }}

  # ===========================================================================
  # Job 3 — Build e push do Nginx central (proxy reverso)
  # ===========================================================================
  build-nginx:
    name: Nginx — build e push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Limpar cache de builds antigos (evita "no space left on device")
        run: docker system prune -af --filter "until=48h"

      - name: Prepara nome da imagem do nginx (lowercase)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-nginx:latest"
          echo "IMAGE_NGINX=$IMAGE" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem do nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NGINX }}

  # ===========================================================================
  # Job 4 — Deploy no servidor (roda após todos os builds)
  # ===========================================================================
  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-nginx]

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" bash -s <<'REMOTE_SCRIPT'
          set -e

          DEPLOY_PATH_HINT="${{ secrets.DEPLOY_PATH }}"

          if [ -n "$DEPLOY_PATH_HINT" ] && [ -f "$DEPLOY_PATH_HINT/docker/docker-compose.prod.yml" ]; then
            PROJECT_DIR="$DEPLOY_PATH_HINT"
            echo "Usando DEPLOY_PATH configurado: $PROJECT_DIR"
          else
            echo "DEPLOY_PATH não definido ou inválido — procurando o projeto em \$HOME..."
            FOUND=$(find "$HOME" -maxdepth 6 -type f -path "*/docker/docker-compose.prod.yml" 2>/dev/null | head -n 1)
            if [ -z "$FOUND" ]; then
              echo "ERRO: não encontrei docker-compose.prod.yml em nenhum lugar dentro de $HOME"
              echo "Conteúdo de \$HOME:"
              ls -la "$HOME"
              exit 1
            fi
            PROJECT_DIR=$(dirname "$(dirname "$FOUND")")
            echo "Projeto encontrado automaticamente em: $PROJECT_DIR"
          fi

          cd "$PROJECT_DIR"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose -f docker/docker-compose.prod.yml --env-file .env pull
          docker compose -f docker/docker-compose.prod.yml --env-file .env up -d
          docker image prune -f
          REMOTE_SCRIPT
