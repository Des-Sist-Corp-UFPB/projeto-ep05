server {
    listen 80;
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Backend ──────────────────────────────────────────────────────────────
    location ^~ /api/      { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /ping      { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /actuator/ { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /webjars/  { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /images/   { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /admin     { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /sysadmin  { proxy_pass http://mercado-app-prod:8080; }
    location ^~ /produtos  { proxy_pass http://mercado-app-prod:8080; }

    # ── Assets do Vite → React ────────────────────────────────────────────
    location ^~ /assets/ {
        proxy_pass http://mercado-frontend-prod:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── React SPA ────────────────────────────────────────────────────────
    location = /index.html {
        proxy_pass http://mercado-frontend-prod:80/index.html;
    }

    location / {
        proxy_pass http://mercado-frontend-prod:80;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
