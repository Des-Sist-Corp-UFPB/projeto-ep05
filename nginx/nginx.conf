# =============================================================================
# Nginx — Proxy Reverso Central (Sweet Delights)
#
# Porta 80 única, roteamento por caminho:
#   /api/*        → Backend Spring Boot (API REST)
#   /ping         → Backend Spring Boot (health)
#   /actuator/*   → Backend Spring Boot (health)
#   /webjars/*    → Backend Spring Boot (Bootstrap/HTMX via WebJars)
#   /assets/*     → Backend Spring Boot (logo e estáticos do Thymeleaf)
#   /admin/*      → Backend Spring Boot (Thymeleaf admin)
#   /sysadmin/*   → Backend Spring Boot (Thymeleaf sysadmin)
#   /produtos/*   → Backend Spring Boot (Thymeleaf produtos)
#   /admin/login  → Backend Spring Boot (Thymeleaf auth do painel)
#   /admin/cadastro → Backend Spring Boot (Thymeleaf auth do painel)
#   /login        → Frontend React (login do cliente)
#   /cadastro     → Frontend React (cadastro do cliente)
#   /*            → Frontend React (SPA — Vite build)
#
# IMPORTANTE — regra de prioridade do nginx:
#   location com regex (~/~*) vence location de prefixo simples,
#   independente da ordem no arquivo. Por isso todos os prefixos do
#   backend usam "^~" (prefixo literal com prioridade máxima), que
#   vence qualquer regex e evita que a regex de extensão de arquivo
#   roube /webjars/bootstrap/css/bootstrap.min.css para o React.
# =============================================================================

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Variáveis de proxy comuns (reutilizadas em todos os blocos do backend)
    # -------------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # =========================================================================
    # BACKEND — Spring Boot
    # Todos usam "^~" para ter prioridade sobre qualquer regex abaixo.
    # =========================================================================

    # API REST
    location ^~ /api/ {
        proxy_pass http://mercado-app-prod:8080;
    }

    # Health / monitoring
    location ^~ /ping {
        proxy_pass http://mercado-app-prod:8080;
    }

    location ^~ /actuator/ {
        proxy_pass http://mercado-app-prod:8080;
    }

    # WebJars — Bootstrap CSS/JS e HTMX carregados pelo Thymeleaf
    location ^~ /webjars/ {
        proxy_pass http://mercado-app-prod:8080;
    }

    # Assets estáticos do backend (logo, imagens usadas pelo Thymeleaf)
    location ^~ /assets/ {
        proxy_pass http://mercado-app-prod:8080;
    }

    # Thymeleaf — Painel admin (cobre /admin/login e /admin/cadastro também)
    location ^~ /admin {
        proxy_pass http://mercado-app-prod:8080;
    }

    # Thymeleaf — SysAdmin
    location ^~ /sysadmin {
        proxy_pass http://mercado-app-prod:8080;
    }

    # Thymeleaf — Produtos (painel)
    location ^~ /produtos {
        proxy_pass http://mercado-app-prod:8080;
    }

    # =========================================================================
    # FRONTEND — React (SPA gerado pelo Vite)
    # Captura tudo que não foi roteado para o backend acima.
    # A regex de extensão serve apenas para adicionar cache header nos assets
    # do Vite (index-abc123.js, etc.) — eles já não conflitam com o backend
    # porque /webjars/ e /assets/ foram capturados pelo ^~ acima.
    # =========================================================================

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://mercado-frontend-prod:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://mercado-frontend-prod:80;
    }
}
