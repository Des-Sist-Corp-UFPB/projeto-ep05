spring:
  datasource:
    # Em produção, as credenciais vêm de variáveis de ambiente — NUNCA hardcode!
    # Configure no sistema operacional, Docker, Kubernetes secrets, etc.
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

# Credenciais dos usuários de seed — OBRIGATÓRIAS em produção (sem valor default).
# Se não definidas, a aplicação falha ao subir (fail-fast), evitando senhas previsíveis.
app:
  seed:
    sysadmin:
      email: ${SEED_SYSADMIN_EMAIL}
      password: ${SEED_SYSADMIN_PASSWORD}
    admin:
      email: ${SEED_ADMIN_EMAIL}
      password: ${SEED_ADMIN_PASSWORD}
    cliente:
      email: ${SEED_CLIENTE_EMAIL}
      password: ${SEED_CLIENTE_PASSWORD}

logging:
  level:
    root: WARN
    br.ufpb.dsc.mercado: INFO
