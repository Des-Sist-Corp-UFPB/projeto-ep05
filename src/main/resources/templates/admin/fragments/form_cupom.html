<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">
    <div class="modal fade" id="cupomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold">Novo Cupom</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form hx-post="/admin/cupons"
                      hx-target="#cupons-body"
                      hx-swap="afterbegin">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Código</label>
                            <input type="text" name="codigo" class="form-control text-uppercase"
                                   placeholder="Ex: DESCONTO20" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Tipo de Desconto</label>
                            <select name="tipo" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo.name() == 'PORCENTAGEM' ? 'Porcentagem (%)' : 'Valor Fixo (R$)'}">Tipo</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Valor do Desconto</label>
                            <input type="number" name="desconto" class="form-control"
                                   step="0.01" min="0" placeholder="Ex: 10 (para 10% ou R$10)" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Data de Expiração</label>
                            <input type="datetime-local" name="dataExpiracao" class="form-control"/>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked/>
                            <label class="form-check-label" for="ativo">Ativo desde a criação</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Criar Cupom</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
