<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal" class="modal fade" id="cupomModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Novo Cupom</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form hx-post="/admin/cupons"
                      hx-target="#tabela-cupons"
                      hx-swap="outerHTML"
                      th:object="${cupom}">

                    <div th:if="${#fields.hasGlobalErrors()}"
                         class="alert alert-danger small py-2 mb-3">
                        <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Código</label>
                        <input type="text" th:field="*{codigo}" class="form-control"
                               th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid'"
                               placeholder="Ex.: NATAL10"/>
                        <div class="invalid-feedback" th:errors="*{codigo}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo</label>
                        <select th:field="*{tipo}" class="form-select"
                                th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'">
                            <option value="">Selecione...</option>
                            <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.name() == 'PERCENTUAL' ? 'Percentual (%)' : 'Valor fixo (R$)'}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{tipo}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Desconto</label>
                        <input type="number" step="0.01" min="0.01" th:field="*{desconto}" class="form-control"
                               th:classappend="${#fields.hasErrors('desconto')} ? 'is-invalid'"
                               placeholder="Ex.: 10.00"/>
                        <div class="invalid-feedback" th:errors="*{desconto}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Data de expiração</label>
                        <input type="datetime-local" th:field="*{dataExpiracao}" class="form-control"
                               th:classappend="${#fields.hasErrors('dataExpiracao')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{dataExpiracao}"></div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Criar Cupom</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
