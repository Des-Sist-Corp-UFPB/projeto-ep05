<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>Código</th>
            <th>Tipo</th>
            <th>Desconto</th>
            <th>Validade</th>
            <th>Status</th>
            <th class="text-end">Ações</th>
        </tr>
        </thead>
        <tbody id="cupons-body">
        <tr th:if="${cupons.empty}">
            <td colspan="6" class="text-center text-muted py-4">Nenhum cupom cadastrado.</td>
        </tr>
        <tr th:each="cupom : ${cupons}" th:id="'cupom-' + ${cupom.id}">
            <td><code class="fw-bold" th:text="${cupom.codigo}">PROMO10</code></td>
            <td th:text="${cupom.tipo.name() == 'PORCENTAGEM' ? 'Porcentagem' : 'Valor Fixo'}">Tipo</td>
            <td>
                <span th:if="${cupom.tipo.name() == 'PORCENTAGEM'}"
                      th:text="${#numbers.formatDecimal(cupom.desconto, 1, 'POINT', 0, 'COMMA') + '%'}">10%</span>
                <span th:if="${cupom.tipo.name() == 'VALOR_FIXO'}"
                      th:text="${'R$ ' + #numbers.formatDecimal(cupom.desconto, 1, 'POINT', 2, 'COMMA')}">R$ 10,00</span>
            </td>
            <td th:text="${cupom.dataExpiracao != null ? #temporals.format(cupom.dataExpiracao, 'dd/MM/yyyy') : '—'}">01/12/2026</td>
            <td>
                <span th:if="${cupom.ativo}" class="badge bg-success-subtle text-success border border-success-subtle">Ativo</span>
                <span th:if="${!cupom.ativo}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">Inativo</span>
            </td>
            <td class="text-end">
                <button class="btn btn-sm btn-outline-warning me-1"
                        th:hx-post="@{/admin/cupons/{id}/alternar(id=${cupom.id})}"
                        th:hx-target="'#cupom-' + ${cupom.id}"
                        hx-swap="outerHTML"
                        th:text="${cupom.ativo ? 'Desativar' : 'Ativar'}">
                    Desativar
                </button>
                <button class="btn btn-sm btn-outline-danger"
                        th:hx-delete="@{/admin/cupons/{id}(id=${cupom.id})}"
                        th:hx-target="'#cupom-' + ${cupom.id}"
                        hx-swap="outerHTML"
                        hx-confirm="Excluir este cupom?">
                    Excluir
                </button>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${cupons.totalPages > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/admin/cupons(pagina=${paginaAtual - 1})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, cupons.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:hx-get="@{/admin/cupons(pagina=${i})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">1</a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual == cupons.totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/admin/cupons(pagina=${paginaAtual + 1})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">Próximo</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
