<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tabela" id="tabela-cupons">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>Código</th>
                <th>Tipo</th>
                <th>Desconto</th>
                <th>Expira em</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${cupons == null or cupons.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">Nenhum cupom cadastrado.</td>
            </tr>
            <tr th:each="cupom : ${cupons}">
                <td class="fw-semibold" th:text="${cupom.codigo}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${cupom.tipo.name() == 'PERCENTUAL'} ? 'bg-info text-dark' : 'bg-secondary'"
                          th:text="${cupom.tipo.name() == 'PERCENTUAL' ? 'Percentual' : 'Valor fixo'}">
                    </span>
                </td>
                <td th:text="${cupom.tipo.name() == 'PERCENTUAL'
                    ? cupom.desconto + '%'
                    : 'R$ ' + #numbers.formatDecimal(cupom.desconto, 1, 'POINT', 2, 'COMMA')}">
                </td>
                <td th:text="${#temporals.format(cupom.dataExpiracao, 'dd/MM/yyyy', #locale)}">—</td>
                <td>
                    <span th:if="${cupom.ativo and !cupom.expirado}" class="badge bg-success">Ativo</span>
                    <span th:if="${cupom.expirado}" class="badge bg-secondary">Expirado</span>
                    <span th:if="${!cupom.ativo and !cupom.expirado}" class="badge bg-danger">Inativo</span>
                </td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-warning me-1"
                            th:hx-post="@{/admin/cupons/{id}/alternar(id=${cupom.id})}"
                            hx-target="#tabela-cupons"
                            hx-swap="outerHTML"
                            th:text="${cupom.ativo} ? 'Desativar' : 'Ativar'">
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                            th:hx-delete="@{/admin/cupons/{id}(id=${cupom.id})}"
                            hx-confirm="Excluir este cupom?"
                            hx-target="#tabela-cupons"
                            hx-swap="outerHTML">
                        Excluir
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

    <nav th:if="${cupons != null and cupons.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/cupons(pagina=${paginaAtual - 1})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, cupons.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/cupons(pagina=${i})}"></a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual >= cupons.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/cupons(pagina=${paginaAtual + 1})}">Próxima</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
