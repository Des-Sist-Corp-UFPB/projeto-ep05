<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tabela" id="tabela-pedidos">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Status</th>
                <th>Data</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${pedidos == null or pedidos.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">Nenhum pedido encontrado.</td>
            </tr>
            <tr th:fragment="linha" th:each="pedido : ${pedidos}" th:id="'pedido-' + ${pedido.id}">
                <td th:text="${pedido.id}"></td>
                <td th:text="${pedido.cliente.nome}"></td>
                <td th:text="${'R$ ' + #numbers.formatDecimal(pedido.totalGeral, 1, 'POINT', 2, 'COMMA')}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${pedido.status.name() == 'ENTREGUE'} ? 'bg-success' :
                                          (${pedido.status.name() == 'CANCELADO'} ? 'bg-danger' :
                                          (${pedido.status.name() == 'ENVIADO'} ? 'bg-primary' :
                                          (${pedido.status.name() == 'PAGO'} ? 'bg-info text-dark' : 'bg-warning text-dark')))"
                          th:text="${pedido.status.name().replace('_', ' ')}">
                    </span>
                </td>
                <td th:text="${#temporals.format(pedido.criadoEm, 'dd/MM/yyyy HH:mm', #locale)}"></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary"
                            th:hx-get="@{/admin/pedidos/{id}(id=${pedido.id})}"
                            hx-target="#modal-container"
                            hx-swap="innerHTML">
                        Detalhes
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

    <nav th:if="${pedidos != null and pedidos.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/pedidos(pagina=${paginaAtual - 1})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pedidos.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/admin/pedidos(pagina=${i})}"></a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual >= pedidos.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/pedidos(pagina=${paginaAtual + 1})}">Próxima</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
