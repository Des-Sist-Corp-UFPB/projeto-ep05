<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Status</th>
            <th>Data</th>
            <th class="text-end">Ações</th>
        </tr>
        </thead>
        <tbody id="pedidos-body">
        <tr th:if="${pedidos.empty}">
            <td colspan="6" class="text-center text-muted py-4">Nenhum pedido encontrado.</td>
        </tr>
        <tr th:each="pedido : ${pedidos}" th:id="'pedido-' + ${pedido.id}" th:fragment="linha">
            <td class="text-muted small">#<span th:text="${pedido.id}">1</span></td>
            <td class="fw-semibold" th:text="${pedido.cliente.nome}">Cliente</td>
            <td th:text="${'R$ ' + #numbers.formatDecimal(pedido.totalGeral, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
            <td>
                <span th:switch="${pedido.status.name()}">
                    <span th:case="'AGUARDANDO_PAGAMENTO'" class="badge bg-warning-subtle text-warning border border-warning-subtle">Aguardando Pagamento</span>
                    <span th:case="'PAGO'" class="badge bg-info-subtle text-info border border-info-subtle">Pago</span>
                    <span th:case="'ENVIADO'" class="badge bg-primary-subtle text-primary border border-primary-subtle">Enviado</span>
                    <span th:case="'ENTREGUE'" class="badge bg-success-subtle text-success border border-success-subtle">Entregue</span>
                    <span th:case="'CANCELADO'" class="badge bg-danger-subtle text-danger border border-danger-subtle">Cancelado</span>
                </span>
            </td>
            <td class="text-muted small" th:text="${#temporals.format(pedido.criadoEm, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
            <td class="text-end">
                <button class="btn btn-sm btn-outline-primary"
                        th:hx-get="@{/admin/pedidos/{id}(id=${pedido.id})}"
                        hx-target="#modal-container"
                        hx-swap="innerHTML">
                    Gerenciar
                </button>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${pedidos.totalPages > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${paginaAtual == 0} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/admin/pedidos(pagina=${paginaAtual - 1})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pedidos.totalPages - 1)}"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:hx-get="@{/admin/pedidos(pagina=${i})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">1</a>
            </li>
            <li class="page-item" th:classappend="${paginaAtual == pedidos.totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:hx-get="@{/admin/pedidos(pagina=${paginaAtual + 1})}"
                   hx-target="#tabela-container" hx-swap="innerHTML">Próximo</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
