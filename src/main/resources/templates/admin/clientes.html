<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Clientes</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold">Clientes</h1>
            <p class="text-muted mb-0">Visualize e gerencie os clientes da loja</p>
        </div>
    </div>

    <div class="card">
        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                 class="bi bi-search" viewBox="0 0 16 16">
                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                            </svg>
                        </span>
                        <input type="search"
                               name="busca"
                               class="form-control"
                               placeholder="Buscar por nome..."
                               th:value="${busca}"
                               hx-get="/admin/clientes"
                               hx-trigger="keyup changed delay:400ms, search"
                               hx-target="#tabela-clientes"
                               hx-swap="outerHTML"/>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="text-muted small" th:if="${clientes != null}">
                        <span th:text="${clientes.totalElements}">0</span> cliente(s)
                    </span>
                </div>
            </div>

            <div id="tabela-clientes">
                <th:block th:insert="~{admin/fragments/tabela_clientes :: tabela}"></th:block>
            </div>

        </div>
    </div>

</main>
</body>
</html>
