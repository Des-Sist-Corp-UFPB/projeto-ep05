<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Categorias</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold">Categorias</h1>
            <p class="text-muted mb-0">Gerencie as categorias de produtos</p>
        </div>
        <button class="btn btn-primary"
                hx-get="/admin/categorias/nova"
                hx-target="#modal-container"
                hx-swap="innerHTML">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-plus-lg me-1" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
            </svg>
            Nova Categoria
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div id="tabela-categorias">
                <th:block th:insert="~{admin/fragments/tabela_categorias :: tabela}"></th:block>
            </div>
        </div>
    </div>

</main>
</body>
</html>
