<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Administradores</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold">Administradores</h1>
            <p class="text-muted mb-0">Crie e gerencie os administradores da plataforma</p>
        </div>
        <!--
          Botão que abre o modal de criar admin via HTMX.
          hx-get busca o fragmento do formulário e injeta no #modal-container do layout.
        -->
        <button class="btn btn-primary"
                hx-get="/sysadmin/admins/novo"
                hx-target="#modal-container"
                hx-swap="innerHTML">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-person-plus me-1" viewBox="0 0 16 16">
                <path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H1s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C9.516 10.68 8.289 10 6 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z"/>
                <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
            </svg>
            Novo Administrador
        </button>
    </div>

    <div class="card">
        <div class="card-body">

            <!-- Campo de busca -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                 class="bi bi-search" viewBox="0 0 16 16">
                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                            </svg>
                        </span>
                        <input type="search"
                               name="busca"
                               class="form-control"
                               placeholder="Buscar por nome..."
                               th:value="${busca}"
                               hx-get="/sysadmin/admins"
                               hx-trigger="keyup changed delay:400ms, search"
                               hx-target="#tabela-admins"
                               hx-swap="outerHTML"/>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="text-muted small" th:if="${admins != null}">
                        <span th:text="${admins.totalElements}">0</span> administrador(es)
                    </span>
                </div>
            </div>

            <!-- Tabela (fragmento reutilizável) -->
            <th:block th:insert="~{sysadmin/fragments/tabela_admins :: tabela}"></th:block>

        </div>
    </div>

</main>
</body>
</html>
