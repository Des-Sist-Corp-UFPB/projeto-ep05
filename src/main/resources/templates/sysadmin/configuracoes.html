<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Configurações</title></head>
<body>
<main>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold">Configurações do Sistema</h1>
            <p class="text-muted mb-0">Parâmetros globais da plataforma</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">🏪 Informações da loja</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Nome da plataforma</label>
                        <input type="text" class="form-control" value="Sweet Delights Manager" disabled/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">E-mail de contato</label>
                        <input type="email" class="form-control" value="contato@sweetdelights.com" disabled/>
                    </div>
                    <div class="alert alert-info small mb-0">
                        ℹ️ Configurações dinâmicas serão implementadas em versão futura.
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">🔒 Segurança</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Força mínima de senha</label>
                        <input type="text" class="form-control" value="6 caracteres (BCrypt strength 12)" disabled/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">JWT Token TTL</label>
                        <input type="text" class="form-control" value="24 horas" disabled/>
                    </div>
                    <div class="alert alert-warning small mb-0">
                        ⚠️ Altere as configurações de segurança com cautela.
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
