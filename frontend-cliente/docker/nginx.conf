# =============================================================================
# Nginx — Sweet Delights Frontend (SPA React)
#
# Responsabilidades:
#   1. Servir os arquivos estáticos gerados pelo Vite
#   2. Redirecionar todas as rotas desconhecidas para index.html (React Router)
#   3. Fazer proxy das chamadas /api/* para o backend Spring Boot
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para assets com hash no nome (gerados pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy para a API do backend — evita CORS em produção
    # O frontend faz chamadas para /api/... e o Nginx encaminha para o Spring Boot
    location /api/ {
        proxy_pass http://mercado-app-prod:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — todas as rotas não encontradas voltam para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
